<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FaceGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">FACE<span>GUARD</span></a>
    <div class="nav-links">
      <a href="/"           class="nav-link {% if request.path == '/' %}active{% endif %}">Recognize</a>
      <a href="/enroll"     class="nav-link {% if request.path == '/enroll' %}active{% endif %}">Enroll</a>
      <a href="/attendance" class="nav-link {% if request.path == '/attendance' %}active{% endif %}">Attendance</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
